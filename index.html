<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>

<body>
    <div class="contenedor">
        <div class="puntuacion">
            <h3>Tu resultado</h3>
            <div class="circulo">
                <span id="numero"> 76</span>
                <span>of 100</span>
            </div>

            <h1>Great</h1>
            <p>Una puntuacion mas alta que el 55% de los demas participantes</p>

        </div>


        <div class="resumen">
            <hi><strong>Resumen</strong></hi>
            <div class="item-reaccion">
                <span class="icon-reacion">⚡</span>
                <span class="name-reacion"><strong>Reaccion</strong></span>
                <span class="puntuacion-reaccion">80</span>
                <span class="total-reaccion">/100</span></span>

            </div>
            <div class="item-memoria">
                <span class="icon-memoria">🧠</span>
                <span class="name-memoria">memoria</span>
                <span class="puntuacion-memoria">92</span>
                <span class="total-memoria">/100</span></span>

            </div>
            <div class="item-verbal">
                <span class="icon-verbal">💬</span>
                <span class="name-verbal">verbal</span>
                <span class="puntuacion-verbal">61</span>
                <span class="total-verbal">/100</span></span>

            </div>
            <div class="item-visual">
                <span class="icon-visual">👁️</span>
                <span class="name-visual">visual</span>
                <span class="puntuacion-visual">73</span>
                <span class="total-visual">/100</span></span>

            </div>
            <button>continuar</button>


        </div>















    </div>
</body>

</html>
